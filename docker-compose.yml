services:
  postgres:
    image: postgres:16-alpine
    container_name: duty_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-dutydb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-dutydb}"]
      interval: 3s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
    container_name: duty_backend
    env_file:
      - ./.env
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["sh", "-c", "npm run prisma:deploy && npm run seed && npm run dev"]

  frontend:
    build:
      context: ./frontend
    container_name: duty_frontend
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-4000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  pgdata:

